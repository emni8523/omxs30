name: Daily Stock Data Fetch

on:
  schedule:
    - cron: '0 16 * * 1-5'  
  workflow_dispatch:          

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write  
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        run: python scrape_investors.py 

      - name: Commit updated datasets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dataset/
          git diff --cached --quiet || git commit -m "data: update $(date -u '+%Y-%m-%d')"
          git push
